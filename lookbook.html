<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="description" content="Каталог образов Мастерской Дикая Роза. Посмотрите, как наши изделия дополняют ваш стиль." data-i18n="meta_lookbook">
    <title data-i18n="lookbook_main_title">Каталог образов | Мастерская Дикая Роза</title>
    
    <!-- Подключаем премиальные шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- Стили -->
    <link rel="stylesheet" href="style.css?v=13.9">

    <!-- Скрипты -->
    <script defer src="translations.js"></script>
    <script defer src="utils.js"></script>
    <script defer src="components.js"></script>
    <script defer src="products-data.js?v=21"></script>
    <script defer src="script.js?v=22"></script>
</head>
<body class="lookbook-page">

    <!-- Навигация -->
    <!-- Навигация (Загружается динамически) -->
    <header id="mainHeader"></header>

    <!-- Заголовок страницы -->
    <section class="page-header">
        <div class="container">
            <div class="section-title">
                <h1 data-i18n="lookbook_main_title">Каталог образов</h1>
            </div>
        </div>
    </section>
 
    <!-- Блок категорий (Аналогично каталогу) -->
    <section class="catalog-section">
        <div class="catalog-controls">
            <div class="container">
                <!-- Сезоны -->
                <div class="season-filter" id="lookSeasons">
                    <button class="season-btn" data-season="winter" data-i18n="season_winter">Зима</button>
                    <button class="season-btn active" data-season="spring" data-i18n="season_spring">Весна</button>
                    <button class="season-btn" data-season="summer" data-i18n="season_summer">Лето</button>
                    <button class="season-btn" data-season="autumn" data-i18n="season_autumn">Осень</button>
                    <button class="season-btn" data-season="symbol" data-i18n="season_symbol">Символы</button>
                </div>
                <!-- Фильтры категорий -->
                <div class="filter-bar" id="lookFilters">
                    <button class="filter-btn active" data-filter="all" data-i18n="filter_all">Все</button>
                    <button class="filter-btn" data-filter="necklaces" data-i18n="filter_necklaces">Колье</button>
                    <button class="filter-btn" data-filter="bracelets" data-i18n="filter_bracelets">Браслеты</button>
                    <button class="filter-btn" data-filter="earrings" data-i18n="filter_earrings">Серьги</button>
                    <button class="filter-btn" data-filter="rings" data-i18n="filter_rings">Кольца</button>
                    <button class="filter-btn" data-filter="sets" data-i18n="filter_sets">Комплекты</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Цифровой Альбом Образов (Группировка One View) -->
    <section class="lookbook-main-area">
        <div class="album-viewport">
            <!-- Кнопки управления (Floating) -->
            <button class="album-nav-btn prev" id="prevCard">‹‹</button>
            <button class="album-nav-btn next" id="nextCardBtn">››</button>

            <!-- Сам альбом -->
            <div class="album-book" id="luxuryAlbum">
                <!-- Контент генерируется динамически через script.js -->
            </div>
        </div>
    </section>



    <!-- Подвал (Загружается динамически) -->
    <footer id="contacts"></footer>

    <!-- Скрипты (перенесены в head) -->

    <!-- Боковое меню (Загружается динамически) -->
    <div id="sidebarComponents"></div>
</body>
</html>
